  </defs>
  <g mask="url(#rl-cut)">
    <path
      d="M36 98 Q36 70 62 70 H104 Q116 70 124 86 H164 Q186 86 186 108 V152 Q186 176 162 176 H62 Q36 176 36 152 Z"
