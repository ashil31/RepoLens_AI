<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" fill="none">
  <title>RepoLens</title>
  <!-- Dark theme chip (#0a0a0a) + same palette as repolens-logo variant=&quot;light&quot; (.repolens-logo-light) -->
  <rect width="220" height="220" rx="48" fill="#0a0a0a" />
  <defs>
    <linearGradient id="rl-f" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#e5e5e5" />
      <stop offset="100%" stop-color="#f5f5f5" />
    </linearGradient>
    <linearGradient id="rl-h" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#737373" />
      <stop offset="100%" stop-color="#737373" stop-opacity="0.95" />
    </linearGradient>
    <radialGradient id="rl-l" cx="36%" cy="32%" r="70%">
      <stop offset="0%" stop-color="#fafafa" />
      <stop offset="55%" stop-color="#e5e5e5" />
      <stop offset="100%" stop-color="#f5f5f5" />
    </radialGradient>
    <mask id="rl-cut">
