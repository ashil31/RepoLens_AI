  </g>
  <circle cx="144" cy="130" r="26" fill="none" stroke="#e5e5e5" stroke-width="2" />
  <circle cx="144" cy="130" r="24.5" fill="none" stroke="#e5e5e5" stroke-width="1" />
  <circle cx="144" cy="130" r="24" fill="url(#rl-l)" />
  <rect
    x="135"
    y="150"
    width="44"
    height="13"
    rx="6.5"
